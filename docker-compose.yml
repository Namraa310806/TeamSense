services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: teamsense-postgres
    environment:
      POSTGRES_DB: teamsense
      POSTGRES_USER: teamsense
      POSTGRES_PASSWORD: teamsense123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamsense"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: teamsense-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: teamsense-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -c "
        python manage.py migrate --noinput &&
        python manage.py seed_data || true &&
        gunicorn teamsense.wsgi:application --bind 0.0.0.0:8000 --workers 3
      "

  celery-worker:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: teamsense-celery
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A teamsense worker -l info

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: teamsense-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
